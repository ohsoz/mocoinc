<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logging you in...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: white;
    }
    p { font-size: 1.2em; }
  </style>
</head>
<body>
  <p>Logging you in, please wait...</p>
  <script>
    function getParams(str) {
      var params = {};
      if (!str || str.length <= 1) return params;
      str.substring(1).split('&').forEach(function(pair) {
        var kv = pair.split('=');
        if (kv.length >= 2) {
          params[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('='));
        }
      });
      return params;
    }

    var fragmentParams = getParams(window.location.hash);
    var queryParams = getParams(window.location.search);
    var params = Object.assign({}, queryParams, fragmentParams);

    if (params['access_token']) {
      // Send token back to the opener (the game) via postMessage
      if (window.opener) {
        window.opener.postMessage(
          { type: 'TWITCH_AUTH_TOKEN', access_token: params['access_token'] },
          '*'
        );
        document.querySelector('p').textContent = 'Logged in! You can close this window.';
        // Close the popup after a short delay
        setTimeout(function() { window.close(); }, 1500);
      } else {
        // No opener -- fallback, save to localStorage directly
        localStorage.setItem('supabase_access_token', params['access_token']);
        document.querySelector('p').textContent = 'Logged in! Return to the game.';
      }
    } else {
      document.body.innerHTML = '<p>Login failed — no token found. Please close this window and try again.</p>';
    }
  </script>
</body>
</html>
